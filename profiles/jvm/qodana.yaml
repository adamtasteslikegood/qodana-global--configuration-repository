version: 1.0

imports:
  - ../../base/qodana.yaml

# JVM (Java/Kotlin) profile — use with jetbrains/qodana-jvm linter
# Recommended linter: jetbrains/qodana-jvm:2025.1

failureConditions:
  severityThresholds:
    critical: 0
    high: 5

  testCoverageThresholds:
    fresh: 60
    total: 50

profile:
  name: qodana.recommended

  groups:
    - groupId: JavaSecurity
      groups:
        - "category:Java/Security"
        - "category:Kotlin/Security"

    - groupId: JavaBestPractices
      groups:
        - "category:Java/Code style issues"
        - "category:Java/Probable bugs"
        - "category:Kotlin/Probable bugs"

    - groupId: LombokSupport
      groups:
        - "category:Java/Lombok"

  inspections:
    - group: JavaSecurity
      enabled: true

    - group: JavaBestPractices
      enabled: true

    - group: LombokSupport
      enabled: true

    - inspection: CheckDependencyLicenses
      enabled: true
      options:
        usePackageSearch: true

    - inspection: HardcodedPasswords
      enabled: true
      options:
        reportDefaultSuspiciousVariableNames: true

    - inspection: SqlNoDataSourceInspection
      enabled: true

    - inspection: SpringJavaInjectionPointsAutowiringInspection
      enabled: true

exclude:
  - name: All
    paths:
      - build
      - target
      - .gradle
      - .idea
      - .git
      - .github
