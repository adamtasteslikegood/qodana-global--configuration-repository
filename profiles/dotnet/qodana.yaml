version: 1.0

imports:
  - ../../base/qodana.yaml

# .NET (C#/F#/VB) profile — use with jetbrains/qodana-dotnet linter
# Recommended linter: jetbrains/qodana-dotnet:2025.1

failureConditions:
  severityThresholds:
    critical: 0
    high: 5

  testCoverageThresholds:
    fresh: 60
    total: 50

profile:
  name: qodana.recommended

  groups:
    - groupId: DotNetSecurity
      groups:
        - "category:C#/Security"

  inspections:
    - group: DotNetSecurity
      enabled: true

    - inspection: CheckDependencyLicenses
      enabled: true
      options:
        usePackageSearch: true

    - inspection: HardcodedPasswords
      enabled: true
      options:
        reportDefaultSuspiciousVariableNames: true

exclude:
  - name: All
    paths:
      - bin
      - obj
      - .git
      - .github
      - packages
