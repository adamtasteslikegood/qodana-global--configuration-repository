version: 1.0

imports:
  - ../../base/qodana.yaml

# Go profile — use with jetbrains/qodana-go linter
# Recommended linter: jetbrains/qodana-go:2025.1

failureConditions:
  severityThresholds:
    critical: 0
    high: 5

  testCoverageThresholds:
    fresh: 60
    total: 50

profile:
  name: qodana.recommended

  groups:
    - groupId: GoSecurity
      groups:
        - "category:Go/Security"

    - groupId: GoBestPractices
      groups:
        - "category:Go"

  inspections:
    - group: GoSecurity
      enabled: true

    - group: GoBestPractices
      enabled: true

    - inspection: CheckDependencyLicenses
      enabled: true
      options:
        usePackageSearch: true

    - inspection: HardcodedPasswords
      enabled: true
      options:
        reportDefaultSuspiciousVariableNames: true

    - inspection: GoUnusedVariable
      enabled: true

    - inspection: GoErrorStringFormat
      enabled: true

exclude:
  - name: All
    paths:
      - vendor
      - .git
      - .github
