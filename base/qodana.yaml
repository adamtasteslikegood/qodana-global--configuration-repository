version: 1.0

# Base profile — inherited by all language-specific profiles.
# Enforces zero-critical policy, security inspections, license compliance,
# and hardcoded-password detection.

failureConditions:
  severityThresholds:
    critical: 0

profile:
  groups:
    - groupId: Security
      groups:
        - "category:Java/Security"
        - "category:Security"
        - "category:Python/Security"
        - "category:JavaScript/Security"
        - "category:TypeScript/Security"
        - "category:Go/Security"
        - "category:PHP/Security"
        - "category:C#/Security"

  inspections:
    - group: Security
      enabled: true

    - inspection: CheckDependencyLicenses
      enabled: true
      options:
        usePackageSearch: true

    - inspection: HardcodedPasswords
      enabled: true
      options:
        reportDefaultSuspiciousVariableNames: true
